name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: cd agent-service && pip install -r requirements.txt

      - name: Lint
        run: cd agent-service && pip install ruff && ruff check .

      - name: Test
        run: cd agent-service && pip install pytest pytest-asyncio && pytest --tb=short

  typescript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        run: cd ui && npm ci

      - name: Typecheck
        run: cd ui && npx tsc --noEmit
